name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}

      - name: Test
        run: npm run test:ci

  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'server/**'
              - 'e2e/**'
              - 'nuxt.config.*'
              - 'playwright.config.*'
              - 'package-lock.json'

  e2e:
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.result == 'success' && needs.changes.outputs.src == 'true'
    # Serialises e2e across all open PRs (shared Neon DB branch).
    # cancel-in-progress: false lets a run finish so globalTeardown cleans up
    # before the next PR's run starts. Note: workflow-level cancel-in-progress: true
    # above will still cancel this job if a new commit is pushed to the SAME PR
    # mid-run — job-level concurrency cannot override workflow-level cancellation.
    # If globalSetup does a full truncate+reseed, this is safe; if not, the next
    # PR run may inherit dirty DB state.
    concurrency:
      group: e2e-shared-db
      cancel-in-progress: false
    # Required repository secrets (Settings → Secrets → Actions):
    #   E2E_DATABASE_URL              — Neon branch connection string (see .env.e2e.example)
    #   NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    #   NUXT_CLERK_SECRET_KEY
    #   NUXT_GOOGLE_CLIENT_ID
    #   NUXT_GOOGLE_CLIENT_SECRET
    #   NUXT_INSTAGRAM_CLIENT_ID
    #   NUXT_INSTAGRAM_CLIENT_SECRET
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npm run e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
          NUXT_GOOGLE_CLIENT_ID: ${{ secrets.NUXT_GOOGLE_CLIENT_ID }}
          NUXT_GOOGLE_CLIENT_SECRET: ${{ secrets.NUXT_GOOGLE_CLIENT_SECRET }}
          NUXT_INSTAGRAM_CLIENT_ID: ${{ secrets.NUXT_INSTAGRAM_CLIENT_ID }}
          NUXT_INSTAGRAM_CLIENT_SECRET: ${{ secrets.NUXT_INSTAGRAM_CLIENT_SECRET }}
          # Allow the mock server's loopback address through SSRF validation.
          # The port must match E2E_MOCK_SERVER_PORT (default 3099).
          NUXT_FEED_DISCOVERY_ALLOWED_HOSTS: "127.0.0.1:3099"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7
