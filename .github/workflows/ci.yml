name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}

      - name: Test
        run: npm run test:ci

  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'server/**'
              - 'e2e/**'
              - 'nuxt.config.*'
              - 'playwright.config.*'
              - 'package-lock.json'

  e2e:
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.result == 'success' && needs.changes.outputs.src == 'true'
    # fail-fast: false so a single spec failure doesn't cancel the other shards.
    strategy:
      fail-fast: false
      matrix:
        spec:
          - auth-unauth.spec.ts
          - auth.spec.ts
          - account.spec.ts
          - connections.spec.ts
          - dashboard.spec.ts
          - feeds.spec.ts
          - onboarding.spec.ts
          - settings.spec.ts
    # Required repository secrets (Settings → Secrets → Actions):
    #   NEON_API_KEY, NEON_PROJECT_ID
    #   NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY, NUXT_CLERK_SECRET_KEY
    #   NUXT_GOOGLE_CLIENT_ID, NUXT_GOOGLE_CLIENT_SECRET
    #   NUXT_INSTAGRAM_CLIENT_ID, NUXT_INSTAGRAM_CLIENT_SECRET
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Compute Neon branch name
        id: branch
        run: |
          name="ci-${{ github.run_id }}-${{ github.run_attempt }}-${SPEC%.spec.ts}"
          echo "name=$name" >> $GITHUB_OUTPUT
        env:
          SPEC: ${{ matrix.spec }}

      - name: Create Neon branch
        id: neon
        run: |
          response=$(curl -sf \
            --request POST \
            --url "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            --header "Authorization: Bearer ${NEON_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"branch\":{\"name\":\"${BRANCH_NAME}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          branch_id=$(echo "$response" | jq -r '.branch.id')
          db_url=$(echo "$response" | jq -r '.connection_uris[0].connection_uri_with_pooler // .connection_uris[0].connection_uri')
          if [ "$db_url" = "null" ] || [ -z "$db_url" ]; then
            echo "Neon API did not return a connection URI. Full response:"
            echo "$response" | jq '.'
            exit 1
          fi
          echo "branch_id=$branch_id" >> $GITHUB_OUTPUT
          echo "db_url=$db_url" >> $GITHUB_OUTPUT
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}

      - name: Run e2e tests
        run: npx playwright test e2e/tests/${{ matrix.spec }}
        env:
          E2E_DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
          NUXT_GOOGLE_CLIENT_ID: ${{ secrets.NUXT_GOOGLE_CLIENT_ID }}
          NUXT_GOOGLE_CLIENT_SECRET: ${{ secrets.NUXT_GOOGLE_CLIENT_SECRET }}
          NUXT_INSTAGRAM_CLIENT_ID: ${{ secrets.NUXT_INSTAGRAM_CLIENT_ID }}
          NUXT_INSTAGRAM_CLIENT_SECRET: ${{ secrets.NUXT_INSTAGRAM_CLIENT_SECRET }}
          # Allow the mock server's loopback address through SSRF validation.
          # The port must match E2E_MOCK_SERVER_PORT (default 3099).
          NUXT_FEED_DISCOVERY_ALLOWED_HOSTS: "127.0.0.1:3099"

      - name: Delete Neon branch
        if: always()
        run: |
          curl -sf \
            --request DELETE \
            --url "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
            --header "Authorization: Bearer ${NEON_API_KEY}"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.neon.outputs.branch_id }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.spec }}
          path: e2e/report/
          retention-days: 7
