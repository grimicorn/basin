<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Static form so Netlify's build-time bot detects and registers the
      "contact" form. The live form in app/pages/contact.vue is client-rendered
      (so the bot never sees it) and submits to this definition over AJAX.
      Field names here must match the live form exactly.
    -->
    <form
      name="contact"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
